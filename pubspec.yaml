name: flutter_artist
description: "Flutter Artist"
version: 0.0.1
homepage: https://flutterartist.dev


environment:
  sdk: ^3.6.1
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  path_provider: ^2.1.5
  encrypt: ^5.0.3
  flutter_form_builder: ^10.3.0+2 # ^10.2.0 # ^10.0.1
  tabbed_view: ^3.1.0 # ^2.1.0 # ^2.0.0
  equatable: ^2.0.8
  graphview: ^1.5.1
  flutter_breadcrumb: ^1.0.1
  uuid: ^4.5.1
  animated_tree_view: ^2.3.0
  hive: ^2.2.3
  # isar: ^3.1.0+1
  # isar: 4.0.0-dev.14
  # number_pagination: ^1.1.6 #
  multi_split_view: ^3.6.1
  flutter_advanced_switch: ^3.2.0 # ^3.1.0
  web: ^1.1.1
  back_button_interceptor: ^8.0.4
  url_launcher: ^6.3.2

  flutter_artist_core:
    path: ../flutter_artist_core
  flutter_artist_theme:
    path: ../flutter_artist_theme
  flutter_artist_router:
    path: ../flutter_artist_router
  flutter_left_right_container:
    path: ../flutter_left_right_container
  flutter_artist_commons_ui:
    path: ../flutter_artist_commons_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  #isar_generator: ^3.1.0+1
  build_runner: ^2.4.6

